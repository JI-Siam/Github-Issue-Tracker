<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github Issues Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/daisyui/5.1.25/daisyui.css" integrity="sha512-0H9mLC6Px7XKRFcC+1nMm3KdhLZwbXr3urza6zM8neJqge8e59xdVPTet/0AcIGExw2q9+vzELlqfV5MzRoGxw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body >

    <header class="">
        <nav class="flex justify-between items-center gap-5 flex-wrap border-b-2 border-gray-200 p-10"> 

                <div class="flex gap-2 justify-center items-center">
                    <img class="w-[30px]" src="./assets/github-logo.png" alt="">
                    <h1 class="text-2xl font-bold">Github Issues Tracker</h1>
                </div>

                <div class="flex gap-2 ">
                         <input type="text" placeholder="Search Issues" class="input input-bordered w-24 md:w-auto" />

                         <button class="btn btn-primary">+ New Issues</button>
                </div>
        </nav>
    </header>

    <section class="toggle-section m-5 sm:m-20">
        <div class="toggle-container flex gap-3 flex-wrap border-2 border-gray-100 rounded-xl py-5 px-10">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </div>
    </section>

    <section class="stats-section m-5 sm:m-20">
         <div class="stats-container flex flex-wrap gap-10 justify-between items-center mt-10 border-2 border-gray-100 rounded-xl py-5 px-10">
            <div class="flex justify-center items-center gap-5">
                <div  class="bg-purple-100 rounded-full p-3">
                      <img class="w-[60px]" src="./assets/Aperture.png" alt="Aperture">
                </div>

                <div class="space-y-3">
                    <h2 id="issues-cnt" class="font-bold text-xl">50 Issues</h2>
                   <p class="text-gray-400">Track and Mangae your project issues</p>
                </div>
            </div>

            <div class="flex gap-2">
                <img src="./assets/Open-Status.png" alt="Open-Status"> <span class="font-bold pr-3">Open</span>

                <img src="./assets/Closed- Status .png" alt="Closed-Status">
                <span class="font-bold">Closed</span>
                
            </div>
        </div>
    </section>

    <section class="items-section m-5 sm:m-20 p-5  border-2 border-gray-50">

        <div id="items-container" class=" grid sm:grid-cols-2  md:grid-cols-3 xl:grid-cols-4 gap-5">
              <div class="issue-card p-5 flex flex-col gap-5 rounded-2xl border-2 border-green-50 border-t-green-500">
                <div class="flex flex-wrap justify-between items-center">
                    <img src="./assets/Open-Status.png" alt="">
                    <h2 class="priority px-4 py-2 bg-red-100 text-red-600 rounded-4xl">High</h2>
                </div>

                <div class="space-y-3">
                    <h2 class="font-bold text-2xl">Title Here</h2>
                    <h4 class="text-gray-400">Some Details here</h4>

                    <div class="flex flex-wrap gap-4 ">
                        <h3 class="px-4 py-2 text-red-600 bg-red-100 rounded-4xl">BUG</h3>

                        <h3 class="px-4 py-2 text-yellow-600 bg-yellow-200 rounded-4xl">Help Wanted</h3>
                    </div>
                </div>

                <hr class="text-gray-300">
                <div>
                    <p class="text-gray-400">some text</p>
                    <p class="text-gray-400">some data</p>
                </div>

            </div>
        </div>
          
    </section>

    

    <script src="./js/home.js"></script>
    
</body>
</html>
