<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github Issues Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/daisyui/5.1.25/daisyui.css" integrity="sha512-0H9mLC6Px7XKRFcC+1nMm3KdhLZwbXr3urza6zM8neJqge8e59xdVPTet/0AcIGExw2q9+vzELlqfV5MzRoGxw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>



    <div class="container my-20 mx-auto flex items-center justify-center text-center ">

    <div class="space-y-2.5 mx-auto">
         <img class="mx-auto" src="./assets/github-logo.png" alt="">
         <h1 class="text-2xl font-bold">Github Issues Tracker</h1>
         <p class="text-gray-400">Sign in to manage your issues</p>

    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
        <legend class="fieldset-legend">Login</legend>

        <label class="label">Username</label>
        <input type="text" id="name" class="input" placeholder="Enter Username" />
        <span class="font-bold text-left text-violet-800">Default: admin</span>

        <label class="label">Password</label>
        <input type="password" id="pass" class="input" placeholder="Enter Password" />
        <span class="font-bold text-left text-violet-800">Default:admin123</span>

        <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>

        <h1 class="text-center">OR</h1>


        <div class="flex flex-col gap-5 p-5 rounded-xl bg-gray-50">
            <h2 class="text-gray-300">Demo Credentials :</h2>
            <div >
                <h2><span class="font-bold">Username</span> : admin</h2>
                <h2><span class="font-bold">Password</span> : admin123</h2>
            </div>
        </div>

    </div>
    </div>

    <script src="./js/login.js"></script>
    
</body>
</html>
